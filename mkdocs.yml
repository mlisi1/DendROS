site_name: DendROS
site_description: Colorized ROS 2 terminal output — assign colors to node groups without touching your launch files.
site_url: https://mlisi1.github.io/DendROS
repo_url: https://github.com/mlisi1/DendROS
repo_name: mlisi1/DendROS
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024 mlisi1

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/dendrobate.png
  favicon: assets/images/dendros_small.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: yellow
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: yellow
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - def_list

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - Configuration:
    - Config File: configuration.md
    - Colors: colors.md
    - Config Merging: config-merging.md
  - Features:
    - Crash Alert: crash-alert.md
    - Traceback Highlighting: traceback-highlighting.md
    - Parameter Change Alert: param-change-alert.md
    - ros2 node list: node-list.md
    - ros2 node info: node-info.md
    - ros2 service list: service-list.md
    - ros2 action list: action-list.md
    - ros2 topic list: topic-list.md
    - ros2 param list: param-list.md
    - ros2 param describe: param-describe.md
  - Tools:
    - dendros init: dendros-init.md
    - dendros config: global-config.md
  - Reference: reference.md
