site_name: DendROS
site_description: Colorized ROS 2 terminal output — assign colors to node groups without touching your launch files.
site_url: https://mlisi1.github.io/DendROS
repo_url: https://github.com/mlisi1/DendROS
repo_name: mlisi1/DendROS
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - Configuration:
    - Config File: configuration.md
    - Colors: colors.md
    - Config Merging: config-merging.md
  - Tools:
    - dendros init: dendros-init.md
    - dendros config: global-config.md
  - Reference: reference.md
